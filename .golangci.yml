# Minimal config for broader checks alongside staticcheck.
# See https://golangci-lint.run/usage/configuration/
version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

# Run govet here; staticcheck is run separately via 'make lint'.
# Use default: none so only govet runs (avoids duplicating staticcheck and extra rules).
linters:
  default: none
  enable:
    - govet
